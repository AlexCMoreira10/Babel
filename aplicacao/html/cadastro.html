<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />

    <link rel="stylesheet" href="../css/login.css">


</head>
<body>
    <ion-app>
        <ion-content class="container">
            <div class="background"></div>
            <div class="cadastro">
                <ion-list>
                    <h2> SUA ESTANTE TE ESPERA!</h2>
                    <ion-item>
                        <ion-input type="text" placeholder="Digite seu nome"></ion-input>
                    </ion-item>
                    <ion-item>
                        <ion-input type="number" placeholder="(11)99999-9999" maxlength="11"></ion-input>
                    </ion-item>
                    <ion-item>
                        <ion-input type="e-mail" placeholder="Digite seu e-mail"></ion-input>
                    </ion-item>
                    <ion-item>
                        <ion-input type="password" placeholder="Digite sua senha"></ion-input>
                    </ion-item>

                    <ion-button> CADASTRAR </ion-button>
                    <ion-button href="../index.html"> VOLTAR </ion-button>
                </ion-list>
            </div>
        </ion-content>
    </ion-app>
</body>
</html>
